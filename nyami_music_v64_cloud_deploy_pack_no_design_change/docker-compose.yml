services:
  nyami-music:
    build: .
    container_name: nyami-music
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      NYAMI_HOST: 0.0.0.0
      NYAMI_PORT: 5000
      NYAMI_NO_OPEN: "1"
      NYAMI_STORAGE_DIR: /app/storage
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped
